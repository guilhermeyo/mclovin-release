<?xml version="1.0" encoding="UTF-8"?>
<!--
  Square viewBox (64x64) with the landscape card centered vertically
  (12 units padding top + bottom of the original 40-tall card).

  Square aspect ratio means iced+resvg's `tree.size()` returns 64x64,
  matching the square widget dimensions used everywhere (picker
  header, Settings header, About hero). With a landscape viewBox
  iced+tiny_skia rasterizes the SVG to a different size than the
  widget bounds, causing overflow into surrounding text. Square fixes
  it without requiring per-widget aspect-aware sizing.

  Duotone palette unchanged: yellow (#F4CF45) outer frame + dark
  (#0D1117) card body, with the M cut-out and 3 info bars.
-->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="12" width="64" height="40" rx="6" fill="#F4CF45"/>
  <rect x="3" y="15" width="58" height="34" rx="4" fill="#0D1117"/>

  <rect x="7" y="19" width="18" height="26" rx="2" fill="#F4CF45"/>

  <path d="M10 23H12L16 28L20 23H22V41H19V29L16 33L13 29V41H10V23Z" fill="#0D1117"/>

  <rect x="31" y="24" width="26" height="4" rx="1" fill="#F4CF45"/>
  <rect x="31" y="31" width="26" height="4" rx="1" fill="#F4CF45"/>
  <rect x="31" y="38" width="20" height="4" rx="1" fill="#F4CF45"/>
</svg>
