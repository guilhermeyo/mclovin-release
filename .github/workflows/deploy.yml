name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.21.0"
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar -xz -C /usr/local/bin
          zola --version

      - name: Build site
        # Until DNS for mclovin.org is live, static/CNAME does not exist
        # and we override base_url to the github.io fallback so internal
        # asset URLs resolve. After CNAME is added (post-DNS), the
        # config.toml base_url (https://mclovin.org) is used instead.
        run: |
          if [ -f static/CNAME ]; then
            zola build
          else
            zola build --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
