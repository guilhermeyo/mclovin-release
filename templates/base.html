<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{{ config.description }}">
  <meta name="theme-color" content="#F4CF45">
  <link rel="icon" type="image/svg+xml" href="{{ get_url(path='favicon.svg') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ get_url(path='favicon-32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ get_url(path='favicon-16.png') }}">
  <link rel="alternate icon" href="{{ get_url(path='favicon.ico') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ get_url(path='apple-touch-icon.png') }}">
  <link rel="stylesheet" href="{{ get_url(path='style.css', cachebust=true) }}">
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-version">
      {{ config.extra.version }}
      <span class="sep">·</span>
      <a href="{{ config.extra.omarchy_url }}" rel="noopener">{{ config.extra.built_on[lang] }}</a>
    </div>
    <div class="footer-langs">
      {% if lang == "en" %}
        <span class="lang active">EN</span>
      {% else %}
        <a class="lang" href="/">EN</a>
      {% endif %}
      <span class="sep">·</span>
      {% if lang == "pt-br" %}
        <span class="lang active">PT</span>
      {% else %}
        <a class="lang" href="/pt-br/">PT</a>
      {% endif %}
      <span class="sep">·</span>
      {% if lang == "es-es" %}
        <span class="lang active">ES</span>
      {% else %}
        <a class="lang" href="/es-es/">ES</a>
      {% endif %}
    </div>
  </footer>
  <script defer src="{{ get_url(path='copy.js', cachebust=true) }}"></script>
</body>
</html>
