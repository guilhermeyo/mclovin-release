<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{{ config.description }}">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    {% if lang == "en" %}
      <span class="lang active">EN</span>
    {% else %}
      <a class="lang" href="/">EN</a>
    {% endif %}
    <span class="sep">·</span>
    {% if lang == "pt-br" %}
      <span class="lang active">PT</span>
    {% else %}
      <a class="lang" href="/pt-br/">PT</a>
    {% endif %}
    <span class="sep">·</span>
    {% if lang == "es-es" %}
      <span class="lang active">ES</span>
    {% else %}
      <a class="lang" href="/es-es/">ES</a>
    {% endif %}
  </footer>
  <script defer src="{{ get_url(path='copy.js') }}"></script>
</body>
</html>
